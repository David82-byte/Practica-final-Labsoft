<!DOCTYPE html>
<html lang="es" ng-app="minitwitterApp">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración</title>
    <link rel="icon" type="image/x-icon" href="img\favicon.ico">
    <!-- Font Awesome (Iconos) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">   

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body ng-controller="AdminController">
    <nav>
        <h2>Panel de Administración</h2>
        <div>
            <button ng-click="logout()" id="btnLogout">
                <i class="fas fa-sign-out-alt"></i> Cerrar sesión <!-- Icono Salir -->
            </button>
        </div>
    </nav>

    <main>
        <!-- USUARIOS -->
        <section>
            <h2>
                <i class="fas fa-users"></i> Usuarios <!-- Icono Usuarios -->
            </h2>
            <button ng-click="mostrarFormularioUsuario = !mostrarFormularioUsuario" class="btnAccion">
                <i class="fas fa-user-plus"></i> Nuevo Usuario <!-- Icono Usuario+ -->
            </button>

            <form ng-show="mostrarFormularioUsuario" ng-submit="crearUsuario()">
                <input
                    type="text"
                    placeholder="Usuario"
                    ng-model="nuevoUsuario.username"
                    required>

                <div>
                    <input
                        ng-attr-type="{{mostrarPassword ? 'text' : 'password'}}"
                        placeholder="Contraseña"
                        ng-model="nuevoUsuario.passwd"
                        required>

                    <button type="button" ng-click="mostrarPassword = !mostrarPassword">
                        <i class="fa-solid" ng-class="mostrarPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                    </button>
                </div>

                <button type="submit">Guardar</button>
            </form>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Usuario</th>
                        <th>Contraseña</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    <tr ng-repeat="u in usuarios">
                        <td>{{u.id}}</td>
                        <td>{{u.username}}</td>
                        <td>{{u.passwd}}</td>

                        <td>
                            <button ng-click="mostrarEditarUsuario = !mostrarEditarUsuario" class="btnEditar">
                                <i class="fas fa-pen"></i> Editar <!-- Icono Lapiz -->
                            </button>

                            <form ng-show="mostrarEditarUsuario" ng-submit="editarUsuario(u)">
                                <input
                                    type="text"
                                    placeholder="Usuario"
                                    ng-model="u.username"
                                    required>

                                <div>
                                    <input
                                        ng-attr-type="{{mostrarPassword ? 'text' : 'password'}}"
                                        placeholder="Contraseña"
                                        ng-model="u.passwd"
                                        required>

                                    <button type="button" ng-click="mostrarPassword = !mostrarPassword">
                                        <i class="fa-solid" ng-class="mostrarPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                                    </button>
                                </div>

                                <button type="submit">Guardar</button>
                            </form>

                            <button ng-if="u.username !== 'admin'" ng-click="eliminarUsuario(u.id)" class="btnEliminar">
                                <i class="fas fa-trash"></i> Eliminar <!-- Icono Basura -->
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>

        <!-- TUITS -->
        <section id="listaTuits">
            <h1>
                <i class="fas fa-comments"></i> Tuits
            </h1>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Usuario</th>
                        <th>Texto</th>
                        <th>Categoría</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    <tr ng-repeat="tuit in tuits">
                        <td>{{tuit.id}}</td>
                        <td>{{tuit.usuario}}</td>
                        <td>{{tuit.texto}}</td>
                        <td>{{tuit.tipo_media}}</td>

                        <td>
                            <button ng-click="verTuit(tuit)" class="btnVer">
                                <i class="fas fa-eye"></i> Ver
                            </button>
                            <button ng-click="eliminarTuit(tuit.id)" class="btnEliminar">
                                <i class="fas fa-trash"></i> Eliminar
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <p ng-show="tuits.length === 0">No hay tuits todavía.</p>
        </section>
    </main>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
